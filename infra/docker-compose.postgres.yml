services:
  postgres:
    image: postgres:16
    container_name: agentsmap-postgres
    environment:
      POSTGRES_DB: agentmap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - agentsmap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentmap"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agentsmap_pgdata:
